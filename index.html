<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nawigacja GPS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<link rel="stylesheet" href="style.css"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#2979ff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
</head>
<body>

<!-- ===== MAP ===== -->
<div id="map"></div>

<!-- ===== TOP NAV BAR ===== -->
<div id="topBar">
    <div class="nav-row">
        <div class="turn-arrow" id="topArrow">⬆</div>
        <div class="nav-info">
            <div><span class="nav-dist" id="topDistNum">—</span><span class="nav-dist-unit" id="topDistUnit"></span></div>
            <div class="nav-street" id="topStreet">—</div>
            <div class="nav-road-badge" id="topRoadBadge" style="display:none">
                <span class="badge" id="topRoadBadgeNum">—</span>
                <span id="topRoadBadgeName">—</span>
            </div>
        </div>
    </div>
    <div id="laneBar"></div>
    <div id="nextTurnHint">
        <span class="nt-arrow" id="ntArrow">→</span>
        <span class="nt-dist" id="ntDist">—</span>
        <span id="ntText">—</span>
    </div>
</div>

<!-- ===== RIGHT SIDEBAR ===== -->
<div id="rightSidebar">
    <div class="sidebar-time" id="sbTime">—:—</div>
    <div class="sidebar-eta-row">
        <span class="eta-dist" id="sbDist">—</span>
        <span class="eta-delay" id="sbDelay" style="display:none">🚗 —</span>
    </div>
    <div class="sidebar-strip">
        <div class="sidebar-strip-track" id="sbTrack">
            <div class="sidebar-strip-progress" id="sbProgress" style="height:0%"></div>
        </div>
    </div>
    <div class="sidebar-bottom-icons">
        <button class="sidebar-icon-btn" id="btnSound" onclick="toggleVoice()" title="Dźwięk">🔊</button>
        <button class="sidebar-icon-btn" onclick="openMainMenu()" title="Menu">☰</button>
    </div>
</div>

<!-- ===== SPEED CLUSTER (TomTom style) ===== -->
<div id="speedCluster">
    <div class="sc-ring" id="scRing">
        <div class="sc-current" id="scCurrent">0</div>
        <div class="sc-unit">km/h</div>
    </div>
    <div class="sc-limit" id="scLimit">—</div>
</div>

<!-- ===== SPEED BAR (bottom) ===== -->
<div id="speedBar">
    <div class="sb-row">
        <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:14px;opacity:0.6">📏</span>
            <b id="statDist" style="font-size:15px">—</b>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:14px;opacity:0.6">⏱</span>
            <b id="statDur" style="font-size:15px">—</b>
        </div>
        <div id="statTraffic" style="display:none;color:#ff5252;font-weight:700;font-size:13px">
            🚗 <span id="statTrafficVal">—</span>
        </div>
        <button class="sb-close" onclick="stopNav()">✕</button>
    </div>
</div>

<!-- ===== CAMERA ALERT ===== -->
<div id="cameraAlert">
    <div class="cam-icon">📸</div>
    <div class="cam-text">
        <div>FOTORADAR</div>
        <div class="cam-dist" id="camDistText">—</div>
        <div class="cam-speed" id="camSpeedText">—</div>
    </div>
</div>

<!-- ===== SPEED WARNING OVERLAY ===== -->
<div id="speedWarning">
    <span style="font-size:28px">⚠️</span>
    <span id="speedWarnText">PRZEKROCZONO PRĘDKOŚĆ!</span>
</div>

<!-- ===== VOICE TOAST ===== -->
<div id="voiceToast">—</div>

<!-- ===== PERSISTENT MENU BUTTON ===== -->
<button id="persistentMenu" onclick="openMainMenu()" title="Menu">☰</button>

<!-- ===== OVERLAY ===== -->
<div id="overlay" onclick="closeMainMenu();closeSettingsSub()"></div>

<!-- ===== MAIN MENU ===== -->
<div id="mainMenu">
    <div class="mm-header">
        <button class="mm-close" onclick="closeMainMenu()">✕</button>
        <h2>🗺️ Nawigacja</h2>
    </div>
    <div class="mm-search">
        <div class="mm-search-wrap">
            <span class="search-icon">🔍</span>
            <input id="dest" placeholder="Wpisz adres lub miasto…" autocomplete="off">
        </div>
        <button class="search-go" onclick="startNav()">▶ Rozpocznij nawigację</button>
    </div>
    <div class="mm-items">
        <div class="mm-item" onclick="startNav();closeMainMenu()"><span class="mm-icon">📍</span><span class="mm-label">Wyznacz trasę</span><span class="mm-arrow">›</span></div>
        <div class="mm-item" onclick="openSettingsSub()"><span class="mm-icon">⚙️</span><span class="mm-label">Ustawienia trasy</span><span class="mm-arrow">›</span></div>
        <div class="mm-item" onclick="openSpeedSettings()"><span class="mm-icon">🚨</span><span class="mm-label">Alerty prędkości</span><span class="mm-arrow">›</span></div>
        <div class="mm-toggle-row">
            <span>🌙 Tryb nocny</span>
            <div class="mm-toggle" id="dayNightToggle" onclick="toggleDayNight()"></div>
        </div>
        <div class="mm-toggle-row">
            <span>🔊 Powiadomienia głosowe</span>
            <div class="mm-toggle on" id="voiceToggle" onclick="toggleVoice()"></div>
        </div>
        <div class="mm-toggle-row">
            <span>🗺️ Obrazy mapy</span>
            <div class="mm-toggle on" id="mapTilesToggle" onclick="toggleMapTiles()"></div>
        </div>
    </div>
    <button class="mm-item" onclick="stopNav();closeMainMenu()" style="color:var(--danger)"><span class="mm-icon">🚫</span><span class="mm-label">Zakończ nawigację</span></button>
</div>

<!-- ===== SETTINGS SUB-PANEL ===== -->
<div id="settingsSub">
    <div class="ss-header">
        <button class="ss-back" onclick="closeSettingsSub()">←</button>
        <h2 id="ssTitle">Ustawienia</h2>
    </div>
    <div class="ss-body" id="ssBody"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="app.js"></script>
</body>
</html>
