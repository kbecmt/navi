<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nawigacja Samochodowa</title>

        <!-- Style dla mapy Leaflet -->
        <link rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <!-- Style dla wtyczki wyznaczania tras -->

        <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            height: 100%;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }
        /* Panel sterowania nawigacją */
        #nav-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 320px;
        }
        h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        /* Ukrycie tekstowych wskazówek krok po kroku, aby nie zasłaniały mapy mobilnie */
        .leaflet-routing-container {
            max-height: 200px;
            overflow-y: auto;
            background: white !important;
            opacity: 0.95;
        }
    </style>
    </head>
    <body>

        <div id="nav-panel">
            <h3>Nawigacja GPS</h3>
            <input type="text" id="destination"
                placeholder="Wpisz cel (np. Warszawa, Al. Jerozolimskie)">
            <button onclick="startNavigation()">Wyznacz trasę</button>
        </div>

        <div id="map"></div>

        <!-- Skrypty Leaflet i Leaflet Routing Machine -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <script>
        let map;
        let userLocation = null;
        let routingControl = null;

        // 1. Inicjalizacja mapy ze środkiem w Polsce
        map = L.map('map').setView([52.069, 19.480], 6);

        // 2. Dodanie warstwy graficznej OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Automatyczne pobieranie pozycji GPS użytkownika
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = [position.coords.latitude, position.coords.longitude];
                    map.setView(userLocation, 14);
                    
                    // Dodanie ikony w miejscu kierowcy
                    L.marker(userLocation).addTo(map)
                        .bindPopup('Twoja pozycja')
                        .openPopup();
                },
                () => {
                    alert("Nie udało się pobrać Twojej lokalizacji. Zezwól na dostęp do GPS.");
                }
            );
        }

        // 4. Funkcja wyszukiwania celu i rysowania trasy
        function startNavigation() {
    const adresDocelowy = document.getElementById('destination').value;
    if (!adresDocelowy) return alert("Wpisz adres docelowy!");
    if (!mojaLokalizacja) return alert("Czekam na sygnał GPS z Twojego urządzenia...");

    // 1. Poprawiony i bezpieczny adres URL (wykorzystuje otwarte proxy bez blokad CORS)
    const url = "https://openstreetmap.org" + encodeURIComponent(adresDocelowy);

    fetch(url, {
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(res => {
        if (!res.ok) throw new Error("Błąd sieci");
        return res.json();
    })
    .then(dane => {
        if (!dane || dane.length === 0) return alert("Nie znaleziono takiego adresu.");

        const celWspolrzedne = [parseFloat(dane[0].lat), parseFloat(dane[0].lon)];

        // Czyszczenie starej trasy
        if (kontrolerTrasy) {
            map.removeControl(kontrolerTrasy);
        }

        // Rysowanie nowej linii trasy samochodowej
        kontrolerTrasy = L.Routing.control({
            waypoints: [
                L.latLng(mojaLokalizacja[0], mojaLokalizacja[1]),
                L.latLng(celWspolrzedne[0], celWspolrzedne[1])
            ],
            router: L.Routing.osrmv1({
                serviceUrl: 'https://project-osrm.org'
            }),
            lineOptions: {
                styles: [{ color: '#ff0055', opacity: 0.8, weight: 6 }]
            },
            createMarker: function() { return null; } // Zapobiega błędom ikon wtyczki
        }).addTo(map);

        // Automatyczne dopasowanie widoku mapy do całej trasy
        const bounds = L.latLngBounds([mojaLokalizacja, celWspolrzedne]);
        map.fitBounds(bounds);
    })
    .catch(error => {
        console.error("Szczegóły błędu:", error);
        alert("Wystąpił problem z połączeniem. Spróbuj wpisać prostszą nazwę miasta (np. 'Warszawa').");
    });
}

    </script>
    </body>
</html>
