<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawigacja Samochodowa</title>
    
    <!-- Style dla mapy Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
 <!-- Style dla wtyczki wyznaczania tras -->

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            height: 100%;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }
        /* Panel sterowania nawigacją */
        #nav-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 320px;
        }
        h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        /* Ukrycie tekstowych wskazówek krok po kroku, aby nie zasłaniały mapy mobilnie */
        .leaflet-routing-container {
            max-height: 200px;
            overflow-y: auto;
            background: white !important;
            opacity: 0.95;
        }
    </style>
</head>
<body>

    <div id="nav-panel">
        <h3>Nawigacja GPS</h3>
        <input type="text" id="destination" placeholder="Wpisz cel (np. Warszawa, Al. Jerozolimskie)">
        <button onclick="startNavigation()">Wyznacz trasę</button>
    </div>

    <div id="map"></div>

    <!-- Skrypty Leaflet i Leaflet Routing Machine -->
     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


    <script>
        let map;
        let userLocation = null;
        let routingControl = null;

        // 1. Inicjalizacja mapy ze środkiem w Polsce
        map = L.map('map').setView([52.069, 19.480], 6);

        // 2. Dodanie warstwy graficznej OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Automatyczne pobieranie pozycji GPS użytkownika
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = [position.coords.latitude, position.coords.longitude];
                    map.setView(userLocation, 14);
                    
                    // Dodanie ikony w miejscu kierowcy
                    L.marker(userLocation).addTo(map)
                        .bindPopup('Twoja pozycja')
                        .openPopup();
                },
                () => {
                    alert("Nie udało się pobrać Twojej lokalizacji. Zezwól na dostęp do GPS.");
                }
            );
        }

        // 4. Funkcja wyszukiwania celu i rysowania trasy
        function startNavigation() {
            const destQuery = document.getElementById('destination').value;
            if (!destQuery) return alert("Wpisz adres docelowy!");
            if (!userLocation) return alert("Czekam na Twoją pozycję GPS...");

            // Używamy darmowego API Nominatim do zamiany tekstu (adresu) na współrzędne geograficzne
            fetch(`https://openstreetmap.org{encodeURIComponent(destQuery)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) return alert("Nie znaleziono takiego adresu.");

                    const destLocation = [parseFloat(data[0].lat), parseFloat(data[0].lon)];

                    // Jeśli trasa już istniała, usuwamy ją przed stworzeniem nowej
                    if (routingControl) {
                        map.removeControl(routingControl);
                    }

                    // Rysowanie nowej trasy samochodowej
                    routingControl = L.Routing.control({
                        waypoints: [
                            L.latLng(userLocation[0], userLocation[1]),
                            L.latLng(destLocation[0], destLocation[1])
                        ],
                        router: L.Routing.osrmv1({
                            serviceUrl: `https://project-osrm.org` // Publiczny silnik tras samochodowych
                        }),
                        lineOptions: {
                            styles: [{ color: '#007bff', opacity: 0.8, weight: 6 }]
                        },
                        createMarker: function() { return null; } // Ukrywa domyślne pinezki wtyczki trasy
                    }).addTo(map);

                    // Dopasowanie widoku mapy do całej trasy
                    const bounds = L.latLngBounds([userLocation, destLocation]);
                    map.fitBounds(bounds);
                })
                .catch(err => {
                    console.error(err);
                    alert("Wystąpił błąd podczas wyszukiwania adresu.");
                });
        }
    </script>
</body>
</html>
