<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nawigacja GPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

<style>
body,html{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background:#0f1117;
    font-family:Arial;
}

#map{
    width:100%;
    height:100%;
}

#panel{
    position:absolute;
    top:15px;
    left:15px;
    z-index:999;
    background:#1c1f2a;
    padding:12px;
    border-radius:10px;
    width:260px;
    color:white;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:6px;
    background:#111522;
    color:white;
}

button{
    width:100%;
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#00a2ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button.stop{
    background:#ff3b3b;
}
</style>
</head>

<body>

<div id="panel">
    <h3>Nawigacja</h3>
    <input id="dest" placeholder="Wpisz cel">
    <button onclick="startNav()">Start</button>
    <button class="stop" onclick="stopNav()">Stop</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
let map = L.map('map').setView([50.06, 19.94], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OSM'
}).addTo(map);

let userPos = null;
let destination = null;
let routeControl = null;
let userMarker = null;

// ===== GPS =====
navigator.geolocation.watchPosition(pos => {

    userPos = L.latLng(pos.coords.latitude, pos.coords.longitude);

    if (!userMarker) {
        userMarker = L.circleMarker(userPos, {
            radius: 8,
            color: "#00a2ff",
            fillColor: "#00a2ff",
            fillOpacity: 1
        }).addTo(map);
    } else {
        userMarker.setLatLng(userPos);
    }

    if (routeControl && destination) {
        routeControl.setWaypoints([userPos, destination]);
    }

}, err => console.log(err), {
    enableHighAccuracy:true,
    maximumAge:1000
});

// ===== START =====
function startNav(){
    const q = document.getElementById("dest").value;
    if(!q) return alert("Wpisz cel");
    if(!userPos) return alert("Brak GPS");

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`)
    .then(r=>r.json())
    .then(data=>{

        if(!data.length) return alert("Nie znaleziono");

        destination = L.latLng(data[0].lat, data[0].lon);

        map.setView(destination, 13);

        drawRoute();

    });
}

// ===== ROUTE =====
function drawRoute(){

    if(routeControl){
        map.removeControl(routeControl);
    }

    routeControl = L.Routing.control({
        waypoints:[userPos,destination],
        router: L.Routing.osrmv1({
            serviceUrl:"https://router.project-osrm.org/route/v1"
        }),
        addWaypoints:false,
        draggableWaypoints:false,
        fitSelectedRoutes:true,
        show:false,
        lineOptions:{
            styles:[{color:"#00f3ff",weight:6}]
        },
        createMarker: ()=>null
    }).addTo(map);
}

// ===== STOP =====
function stopNav(){

    destination = null;

    if(routeControl){
        map.removeControl(routeControl);
        routeControl = null;
    }

    alert("Nawigacja zatrzymana");
}
</script>

</body>
</html>
